openapi: 3.0.3
info:
  title: SDKWA
  version: 1.0.0
  contact: {}
servers:
  - url: https://sdkwa.pro
paths:
  /whatsapp/{idInstance}/getSettings:
    get:
      tags:
        - Account
      summary: Get account settings
      description: >-
        # GetSettings

        Метод предназначен для получения текущих настроек аккаунта.

        ## Запрос {#request}

        Для получения текущих настроек аккаунта требуется выполнить запрос по адресу:
        ```
        GET https://{{apiHost}}/waInstance{{idInstance}}/GetSettings/{{apiTokenInstance}}
        ```

        Для получения параметров запроса `idInstance` и `apiTokenInstance` обратитесь к разделу [Перед началом работы](../../before-start.md#parameters).

        ## Ответ {#response}

        ### Поля ответа {#response-parameters}

        Поле | Тип |  Описание
        ----- | ----- | ----- 
        `wid` | **string** | Идентификатор аккаунта в WhatsApp
        `countryInstance` | **string** | Код страны аккаунта по стандарту [ISO 3166-2](https://ru.wikipedia.org/wiki/ISO_3166-2)
        `typeAccount` | **string** | Тип аккаунта, возможные значения: `WA_DESKTOP`, `WA_MOBILE`
        `releaseType` | **string** | Тип релиза, возможные значения: `STABLE`, `LATEST`
        `webhookUrl` | **string** | URL для получения входящих уведомлений
        `webhookUrlToken` | **string** | Токен для подключения к вашему вебхук серверу
        `delaySendMessagesMilliseconds` | **integer** | [Минимальный интервал отправки сообщений](../send-messages-delay.md) в миллисекундах
        `delaySendMessagesMaxMs` | **integer** | [Максимальный интервал отправки сообщений](../send-messages-delay.md) в миллисекундах
        `markIncomingMessagesReaded` | **string** | Отмечать входящие сообщения прочитанными или нет, возможные значения: `yes`, `no`. Игнорируется, если markIncomingMessagesReadedOnReply в значении 'yes'.
        `markIncomingMessagesReadedOnReply` | **string** | Отмечать входящие сообщения прочитанными при отправке сообщения в чат через API, возможные значения: `yes`, `no`. Если в значении 'yes', то настройка markIncomingMessagesReaded игнорируется.
        `outgoingWebhook` | **string** | Получать уведомления о статусах отправки/доставки/прочтении исходящих сообщений, возможные значения: `yes`, `no`
        `outgoingMessageWebhook` | **string** | Получать уведомления о сообщениях, отправленных с телефона, возможные значения: `yes`, `no`
        `stateWebhook` | **string** | Получать уведомления об изменении состояния авторизации аккаунта, возможные значения: `yes`, `no`
        `incomingWebhook` | **string** | Получать уведомления о входящих сообщениях и файлах, возможные значения: `yes`, `no`
        `deviceWebhook` | **string** | Получать уведомления об устройстве (телефоне) и уровне заряда батареи, возможные значения: `yes`, `no`
        `statusInstanceWebhook` | **string** | Получать уведомления об изменении состояния соединения сокета аккаунта, возможные значения: `yes`, `no`
      operationId: getAccountSettings
      responses:
        '200':
          description: getSettings
          headers:
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '85'
            Date:
              schema:
                type: string
                example: Mon, 20 Apr 2020 19:48:22 GMT
            Server:
              schema:
                type: string
                example: nginx/1.10.3
          content:
            application/json:
              schema:
                type: object
                properties:
                  countryInstance:
                    type: string
                    example: ru
                  delaySendMessagesMilliseconds:
                    type: number
                    example: 3000
                  deviceWebhook:
                    type: string
                    example: 'no'
                  incomingWebhook:
                    type: string
                    example: 'yes'
                  markIncomingMessagesReaded:
                    type: string
                    example: 'yes'
                  outgoingWebhook:
                    type: string
                    example: 'yes'
                  stateWebhook:
                    type: string
                    example: 'yes'
                  typeAccount:
                    type: string
                    example: vip
                  webhookUrl:
                    type: string
                    example: https://mysite.com/webhook/sdkwa/
                  wid:
                    type: string
                    example: 79001234567@c.us
              examples:
                getSettings:
                  value:
                    countryInstance: ru
                    delaySendMessagesMilliseconds: 3000
                    deviceWebhook: 'no'
                    incomingWebhook: 'yes'
                    markIncomingMessagesReaded: 'yes'
                    outgoingWebhook: 'yes'
                    stateWebhook: 'yes'
                    typeAccount: vip
                    webhookUrl: https://mysite.com/webhook/sdkwa/
                    wid: 79001234567@c.us
    parameters:
      - name: idInstance
        in: path
        required: true
        schema:
          type: string
      - name: apiTokenInstance
        in: path
        required: true
        schema:
          type: string
  /whatsapp/{idInstance}/setSettings:
    post:
      tags:
        - Account
      summary: Set account settings
      description: >-
        Документация
        [SetSettings](https://sdkwa.pro/en/docs/api/account/SetSettings/)
      operationId: setAccountSettings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                delaySendMessagesMilliseconds:
                  type: number
                  example: 1000
                incomingWebhook:
                  type: string
                  example: 'yes'
                keepOnlineStatus:
                  type: string
                  example: 'no'
                markIncomingMessagesReaded:
                  type: string
                  example: 'no'
                markIncomingMessagesReadedOnReply:
                  type: string
                  example: 'no'
                outgoingAPIMessageWebhook:
                  type: string
                  example: 'no'
                outgoingMessageWebhook:
                  type: string
                  example: 'yes'
                outgoingWebhook:
                  type: string
                  example: 'yes'
                stateWebhook:
                  type: string
                  example: 'yes'
                webhookUrl:
                  type: string
                  example: ''
                webhookUrlToken:
                  type: string
                  example: ''
            example:
              delaySendMessagesMilliseconds: 1000
              incomingWebhook: 'yes'
              keepOnlineStatus: 'no'
              markIncomingMessagesReaded: 'no'
              markIncomingMessagesReadedOnReply: 'no'
              outgoingAPIMessageWebhook: 'no'
              outgoingMessageWebhook: 'yes'
              outgoingWebhook: 'yes'
              stateWebhook: 'yes'
              webhookUrl: ''
              webhookUrlToken: ''
      responses:
        '200':
          description: setSettings
          headers:
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '26'
            Date:
              schema:
                type: string
                example: Tue, 21 Apr 2020 13:16:18 GMT
            Server:
              schema:
                type: string
                example: nginx/1.10.3
          content:
            application/json:
              schema:
                type: object
                properties:
                  saveSettings:
                    type: boolean
                    example: true
              examples:
                setSettings:
                  value:
                    saveSettings: true
    parameters:
      - name: idInstance
        in: path
        required: true
        schema:
          type: string
      - name: apiTokenInstance
        in: path
        required: true
        schema:
          type: string
