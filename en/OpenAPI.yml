  /api/v1/instance/user/instance/createByOrder:
    post:
      tags:
        - instances management
      summary: Create new instance
      description: |-
        Параметр **period** может принимать значения:

        *   month1 - продлить инстанс на 1 месяц
        *   month3 - продлить инстанс на 3 месяца
        *   month6 - продлить инстанс на 6 месяцев
        *   month12 - продлить инстанс на 12 месяцев
        *   day1 - продлить инстанс на 1 день
      operationId: createNewInstance
      parameters:
        - name: x-ga-method
          in: header
          schema:
            type: string
            example: user.instance.create
        - name: x-ga-user-id
          in: header
          schema:
            type: string
            example: '{{user-id}}'
        - name: x-ga-user-token
          in: header
          schema:
            type: string
            example: '{{user-token}}'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                period:
                  type: string
                  example: infinitely
                tariff:
                  type: string
                  example: DEVELOPER
            example:
              period: infinitely
              tariff: DEVELOPER
      responses:
        '200':
          description: Not enough balance
          headers:
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: '*'
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: '*'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '82'
            Date:
              schema:
                type: string
                example: Mon, 10 Jan 2022 05:22:53 GMT
            ETag:
              schema:
                type: string
                example: W/"52-4HYb2D771uKdofCgDLintregA4k"
            Server:
              schema:
                type: string
                example: nginx/1.14.0 (Ubuntu)
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties: {}
                  error:
                    type: object
                    properties:
                      code:
                        type: number
                        example: 464
                      description:
                        type: string
                        example: Not enough balance
                  result:
                    type: boolean
                    example: false
              examples:
                Not enough balance:
                  value:
                    data: {}
                    error:
                      code: 464
                      description: Not enough balance
                    result: false
