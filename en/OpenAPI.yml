  /whatsapp/{idInstance}/SendButtons:
    post:
      tags:
        - Sending
        - Buttons
      summary: Send Buttons
      description: >-
        Документация
        [SendMessage](https://sdkwa.pro/en/docs/api/sending/SendMessage/)
      operationId: sendButtons
      parameters:
        - name: x-uiid-instance-account
          in: header
          schema:
            type: string
            example: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                buttons:
                  type: array
                  items:
                    type: object
                    properties:
                      buttonId:
                        type: string
                        example: '1'
                      buttonText:
                        type: string
                        example: test1
                  example:
                    - buttonId: '1'
                      buttonText: test1
                    - buttonId: '2'
                      buttonText: test2
                    - buttonId: '3'
                      buttonText: test3
                chatId:
                  type: string
                  example: 712345678910@c.us
                footer:
                  type: string
                  example: Footer
                message:
                  type: string
                  example: Hello
            example:
              buttons:
                - buttonId: '1'
                  buttonText: test1
                - buttonId: '2'
                  buttonText: test2
                - buttonId: '3'
                  buttonText: test3
              chatId: 712345678910@c.us
              footer: Footer
              message: Hello
      responses:
        '200':
          description: SendButtons
          headers:
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '41'
            Date:
              schema:
                type: string
                example: Fri, 17 Apr 2020 13:14:58 GMT
            Server:
              schema:
                type: string
                example: nginx/1.10.3
          content:
            application/json:
              schema:
                type: object
                properties:
                  idMessage:
                    type: string
                    example: 3EB0C767D097B7C7C030
              examples:
                SendButtons:
                  value:
                    idMessage: 3EB0C767D097B7C7C030
    parameters:
      - name: idInstance
        in: path
        required: true
        schema:
          type: string
      - name: apiTokenInstance
        in: path
        required: true
        schema:
          type: string
  /whatsapp/{idInstance}/SendListMessage:
    post:
      tags:
        - Sending
        - Buttons
      summary: Send List Message
      description: >-
        Документация
        [SendMessage](https://sdkwa.pro/en/docs/api/sending/SendMessage/)
      operationId: sendListMessage
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                buttonText:
                  type: string
                  example: Button text
                chatId:
                  type: string
                  example: 7123456789@c.us
                footer:
                  type: string
                  example: Footer
                message:
                  type: string
                  example: Text
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      rows:
                        type: array
                        items:
                          type: object
                          properties:
                            description:
                              type: string
                              example: Description
                            rowId:
                              type: string
                              example: option1
                            title:
                              type: string
                              example: Option 1
                        example:
                          - rowId: option1
                            title: Option 1
                          - description: Description
                            rowId: option2
                            title: Option 2
                      title:
                        type: string
                        example: Section 1
                  example:
                    - rows:
                        - rowId: option1
                          title: Option 1
                        - description: Description
                          rowId: option2
                          title: Option 2
                      title: Section 1
                    - rows:
                        - rowId: option3
                          title: Option 3
                        - description: Description
                          rowId: option4
                          title: Option 4
                      title: Section 2
                title:
                  type: string
                  example: Title
            example:
              buttonText: Button text
              chatId: 7123456789@c.us
              footer: Footer
              message: Text
              sections:
                - rows:
                    - rowId: option1
                      title: Option 1
                    - description: Description
                      rowId: option2
                      title: Option 2
                  title: Section 1
                - rows:
                    - rowId: option3
                      title: Option 3
                    - description: Description
                      rowId: option4
                      title: Option 4
                  title: Section 2
              title: Title
      responses:
        '200':
          description: SendListMessage
          headers:
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '41'
            Date:
              schema:
                type: string
                example: Fri, 17 Apr 2020 13:14:58 GMT
            Server:
              schema:
                type: string
                example: nginx/1.10.3
          content:
            application/json:
              schema:
                type: object
                properties:
                  idMessage:
                    type: string
                    example: 3EB0C767D097B7C7C030
              examples:
                SendListMessage:
                  value:
                    idMessage: 3EB0C767D097B7C7C030
    parameters:
      - name: idInstance
        in: path
        required: true
        schema:
          type: string
      - name: apiTokenInstance
        in: path
        required: true
        schema:
          type: string
  /whatsapp/{idInstance}/SendTemplateButtons:
    post:
      tags:
        - Sending
        - Buttons
      summary: Send Template Buttons
      description: >-
        Документация
        [SendMessage](https://sdkwa.pro/en/docs/api/sending/SendMessage/)
      operationId: sendTemplateButtons
      parameters:
        - name: x-uiid-instance-account
          in: header
          schema:
            type: string
            example: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                chatId:
                  type: string
                  example: 71234567891c.us
                footer:
                  type: string
                  example: What kind of action will you choose?
                message:
                  type: string
                  example: Hello
                templateButtons:
                  type: array
                  items:
                    type: object
                    properties:
                      callButton:
                        type: object
                        properties:
                          displayText:
                            type: string
                            example: Call us
                          phoneNumber:
                            type: string
                            example: +1 (234) 5678-901
                      index:
                        type: number
                        example: 1
                      quickReplyButton:
                        type: object
                        properties:
                          displayText:
                            type: string
                            example: Plain button
                          id:
                            type: string
                            example: plainButtonId
                      urlButton:
                        type: object
                        properties:
                          displayText:
                            type: string
                            example: ⭐ Star us on GitHub!
                          url:
                            type: string
                            example: https://github.com/Yard-Tean/docs
                  example:
                    - index: 1
                      urlButton:
                        displayText: ⭐ Star us on GitHub!
                        url: https://github.com/Yard-Tean/docs
                    - callButton:
                        displayText: Call us
                        phoneNumber: +1 (234) 5678-901
                      index: 2
                    - index: 3
                      quickReplyButton:
                        displayText: Plain button
                        id: plainButtonId
                title:
                  type: string
                  example: Title
            example:
              chatId: 71234567891c.us
              footer: What kind of action will you choose?
              message: Hello
              templateButtons:
                - index: 1
                  urlButton:
                    displayText: ⭐ Star us on GitHub!
                    url: https://github.com/Yard-Tean/docs
                - callButton:
                    displayText: Call us
                    phoneNumber: +1 (234) 5678-901
                  index: 2
                - index: 3
                  quickReplyButton:
                    displayText: Plain button
                    id: plainButtonId
              title: Title
      responses:
        '200':
          description: SendTemplateButtons
          headers:
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '41'
            Date:
              schema:
                type: string
                example: Fri, 17 Apr 2020 13:14:58 GMT
            Server:
              schema:
                type: string
                example: nginx/1.10.3
          content:
            application/json:
              schema:
                type: object
                properties:
                  idMessage:
                    type: string
                    example: 3EB0C767D097B7C7C030
              examples:
                SendTemplateButtons:
                  value:
                    idMessage: 3EB0C767D097B7C7C030
    parameters:
      - name: idInstance
        in: path
        required: true
        schema:
          type: string
      - name: apiTokenInstance
        in: path
        required: true
        schema:
          type: string
